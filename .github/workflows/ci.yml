name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Type · Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check --output-format=github .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy

      - name: Tests + coverage (pytest)
        run: pytest --cov=ai_engineering_metrics --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  build-e2e:
    name: Build · Publish check · E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build wheel + sdist
        run: python -m build

      - name: Check package metadata (simulates PyPI upload validation)
        run: twine check --strict dist/*

      - name: E2E — install from wheel and run CLI
        run: |
          pip install dist/*.whl
          ai-engineering-metrics --version
          ai-engineering-metrics analyze --mock --output /tmp/e2e-reports
          test -f /tmp/e2e-reports/DEMO-1/dashboard.html
          test -f /tmp/e2e-reports/DEMO-1/metrics.json
          test -f /tmp/e2e-reports/DEMO-1/stories.csv
          test -f /tmp/e2e-reports/DEMO-1/pull_requests.csv
          echo "E2E passed — all artifacts present"

      - name: Upload demo dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-dashboard
          path: /tmp/e2e-reports/DEMO-1/dashboard.html
          if-no-files-found: error

  docker:
    name: Docker build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker compose build

      - name: Run full suite in container
        run: docker compose -f docker-compose.test.yml run --rm test
